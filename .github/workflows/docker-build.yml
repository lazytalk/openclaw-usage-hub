name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'db/**'
      - 'scripts/**'
      - 'package.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_REPOSITORY: openclaw-usage-hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GHCR metadata
        id: ghcr_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.ghcr_meta.outputs.tags }}
          labels: ${{ steps.ghcr_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Alibaba Cloud ACR
        if: ${{ secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' && vars.ACR_REGISTRY != '' && vars.ACR_NAMESPACE != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract ACR metadata
        if: ${{ secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' && vars.ACR_REGISTRY != '' && vars.ACR_NAMESPACE != '' }}
        id: acr_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image to Alibaba Cloud ACR
        if: ${{ secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' && vars.ACR_REGISTRY != '' && vars.ACR_NAMESPACE != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.acr_meta.outputs.tags }}
          labels: ${{ steps.acr_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
