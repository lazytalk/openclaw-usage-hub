services:
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-usage-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw_usage}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw_usage}"]
      interval: 10s
      timeout: 5s
      retries: 10

  hub:
    image: ghcr.io/lazytalk/openclaw-usage-hub:latest
    container_name: openclaw-usage-hub
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-openclaw}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openclaw_usage}
      INGEST_API_KEY: ${INGEST_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OpenClaw Usage Hub}
    ports:
      - "${HUB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:
